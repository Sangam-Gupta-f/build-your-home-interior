<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Get Quote | Build Your Home Interiors</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f1ea;
      color: #111;
    }

    .quote-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 16px;
      background:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
        url("https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1600&q=80");
      background-size: cover;
      background-position: center;
    }

    .quote-card {
      width: 100%;
      max-width: 480px;
      background: #ffffff;
      border-radius: 22px;
      padding: 32px 26px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    .brand {
      margin-bottom: 18px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #7a4d22;
    }

    .quote-card h1 {
      margin: 0 0 10px;
      font-size: 30px;
      line-height: 1.2;
      color: #111;
    }

    .quote-card p {
      margin: 0 0 24px;
      color: #555;
      font-size: 15px;
      line-height: 1.5;
    }

    .quote-form {
      display: flex;
      flex-direction: column;
      gap: 13px;
    }

    .quote-form input,
    .quote-form select {
      width: 100%;
      padding: 14px 15px;
      border: 1px solid #ddd;
      border-radius: 11px;
      background: #fff;
      font-size: 15px;
      color: #111;
      outline: none;
    }

    .quote-form input:focus,
    .quote-form select:focus {
      border-color: #111;
    }

    .quote-form button {
      margin-top: 6px;
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 11px;
      background: #111;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .quote-form button:hover {
      background: #333;
    }

    .back-link {
      display: inline-block;
      margin-top: 18px;
      color: #555;
      font-size: 14px;
      text-decoration: none;
    }

    .back-link:hover {
      color: #111;
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .quote-card {
        padding: 26px 18px;
        border-radius: 18px;
      }

      .quote-card h1 {
        font-size: 25px;
      }
    }
  </style>
</head>

<body>
  <main class="quote-page">
    <section class="quote-card">
      <div class="brand">Build Your Home Interiors</div>

      <h1>Get Your Design Quote</h1>
      <p>
        Fill your details and our team will contact you for architectural or interior design services.
      </p>

      <form action="https://formsubmit.co/buildyourhomeinteriors@gmail.com" method="POST" class="quote-form">
        <!-- FormSubmit Settings -->
        <input type="hidden" name="_subject" value="New Quote Lead - Build Your Home Interiors">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_template" value="table">

        <!-- Optional thank-you redirect -->
        <!-- <input type="hidden" name="_next" value="https://buildyourhomeinteriors.in/thank-you.html"> -->

        <input 
          type="text" 
          name="Name" 
          placeholder="Your Name" 
          required
        >

        <input 
          type="tel" 
          name="Phone" 
          placeholder="Phone Number" 
          pattern="[0-9]{10}" 
          maxlength="10"
          required
        >

        <input 
          type="email" 
          name="Email" 
          placeholder="Email ID" 
          required
        >

        <input 
          type="text" 
          name="Location" 
          placeholder="Location / City" 
          required
        >

        <select name="Requirement" required>
          <option value="">Select Requirement</option>
          <option value="Architectural Design">Architectural Design</option>
          <option value="Interior Design">Interior Design</option>
          <option value="Both Services">Both Services</option>
        </select>

        <button type="submit">Submit & Get Callback</button>
      </form>

      <a href="index.html" class="back-link">← Back to Home</a>
    </section>
  </main>
</body>
</html>
